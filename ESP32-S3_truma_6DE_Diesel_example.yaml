###############################
# ESPHome Version >= 2026.3.0 #
# ESP32-S3 !                  #
# Truma 6DE                   #
###############################

esphome:
  name: "truma"

external_components:
  - source:
      type: git
      url: https://github.com/havanti/esphome-truma.git
    components: [truma_inetbox, uart]
    refresh: 0s

esp32:
  board: esp32-s3-devkitc-1
  variant: esp32s3
  framework:
    type: esp-idf
    version: recommended
    sdkconfig_options:
      # PSRAM (OPI/OctalSPI for N16R8)
      CONFIG_SPIRAM: "y"
      CONFIG_SPIRAM_MODE_OCT: "y"
      CONFIG_SPIRAM_SPEED_80M: "y"
      CONFIG_SPIRAM_FETCH_INSTRUCTIONS: "y"
      CONFIG_SPIRAM_RODATA: "y"
      # Offload BLE stack to PSRAM
      CONFIG_BT_ALLOCATION_FROM_SPIRAM_FIRST: "y"
      CONFIG_BT_BLE_DYNAMIC_ENV_MEMORY: "y"

logger:
  level: DEBUG
  baud_rate: 115200

api:
  encryption:
    key: ""
  on_client_connected:
    - logger.log: "Home Assistant CONNECTED"
  on_client_disconnected:
    - logger.log: "Home Assistant DISCONNECTED"

wifi:
  networks:
    - ssid: !secret wifi_WOMO_WLAN_ssid
      password: !secret wifi_WOMO_password
    - ssid: !secret wifi_Home_ssid
      password: !secret wifi_Home_password
  fast_connect: false
  output_power: 17dB
  power_save_mode: light
  reboot_timeout: 0s
  on_connect:
    - logger.log: "WiFi CONNECTED"
  on_disconnect:
    - logger.log: "WiFi DISCONNECTED"

globals:
  - id: decoking_remaining
    type: int
    restore_value: false
    initial_value: '0'
  - id: led_color  # 1 = green (alive)  2 = blue (TX)
    type: int
    restore_value: no
    initial_value: '0'
  - id: led_ticks  # Countdown in 100 ms steps
    type: int
    restore_value: no
    initial_value: '0'

# ─── Onboard RGB LED ─────────────────────────────────────────────────────────
# Waveshare ESP32-S3-DEV-KIT-N8R8: WS2812 RGB LED on GPIO38, RGB color order
# https://www.waveshare.com/wiki/ESP32-S3-DEV-KIT-N8R8
# Green blink (every 2 s, 500 ms): CP Plus connected – LIN bus active
# Blue flash  (300 ms):            TX command sent to heater
# Off:                             CP Plus not connected (after 90 s timeout)

light:
  - platform: esp32_rmt_led_strip
    id: onboard_led
    pin: GPIO38
    num_leds: 1
    chipset: WS2812
    rgb_order: RGB
    internal: true

interval:
  - interval: 5min
    startup_delay: 2min
    then:
      - if:
          condition:
            not:
              wifi.connected:
          then:
            - logger.log: "WiFi lost → Soft-Reconnect"
            - wifi.disable:
            - delay: 5s
            - wifi.enable:
  - interval: 2s        # LED alive indicator: green when CP Plus connected
    then:
      - lambda: |-
          if (id(cp_plus_alive).state) { id(led_color) = 1; id(led_ticks) = 5; }

  - interval: 100ms     # LED driver: show color, count down ticks
    then:
      - lambda: |-
          if (id(led_ticks) > 0) {
            id(led_ticks) -= 1;
            auto call = id(onboard_led)->turn_on();
            if (id(led_color) == 1) call.set_rgb(0.0, 1.0, 0.0);  // green
            else                    call.set_rgb(0.0, 0.3, 1.0);  // blue
            call.set_brightness(0.15);
            call.set_transition_length(0);
            call.perform();
          } else {
            auto call = id(onboard_led)->turn_off();
            call.set_transition_length(0);
            call.perform();
          }

  - interval: 1min
    then:
      - if:
          condition:
            lambda: 'return id(decoking_remaining) > 0;'
          then:
            - lambda: |-
                id(decoking_remaining) -= 1;
                id(decoking_timer_sensor).publish_state(id(decoking_remaining));

uart:
  - id: lin_uart_bus
    tx_pin: GPIO18   # Was GPIO17 – PSRAM-conflict-free
    rx_pin: GPIO8    # Was GPIO16 – PSRAM-conflict-free
    baud_rate: 9600
    data_bits: 8
    parity: NONE
    stop_bits: 2

time:
  - platform: homeassistant
    id: homeassistant_time

# ─── BLE ────────────────────────────────────────────────────────────────────
esp32_ble_tracker:
  scan_parameters:
    interval: 1100ms
    window: 1100ms
    active: false
  on_ble_advertise:
    - mac_address: "00:00:00:00:00:00"  # Front Left – replace with your sensor MAC
      then:
        - lambda: |-
            for (auto data : x.get_manufacturer_datas()) {
              if (data.data.size() >= 3) {
                uint16_t mfr_id    = data.uuid.get_uuid().uuid.uuid16;
                float battery      = ((mfr_id >> 8) & 0xFF) * 0.1f;
                float temperature  = (float)data.data[0];
                uint16_t raw_pres  = (data.data[1] << 8) | data.data[2];
                float pressure_bar = (raw_pres / 10.0f - 14.696f) / 14.5038f;
                if (pressure_bar > 0.5f) {
                  id(tpms_fl_battery).publish_state(battery);
                  id(tpms_fl_temperature).publish_state(temperature);
                  id(tpms_fl_pressure).publish_state(pressure_bar);
                }
              }
            }
    - mac_address: "00:00:00:00:00:00"  # Front Right – replace with your sensor MAC
      then:
        - lambda: |-
            for (auto data : x.get_manufacturer_datas()) {
              if (data.data.size() >= 3) {
                uint16_t mfr_id    = data.uuid.get_uuid().uuid.uuid16;
                float battery      = ((mfr_id >> 8) & 0xFF) * 0.1f;
                float temperature  = (float)data.data[0];
                uint16_t raw_pres  = (data.data[1] << 8) | data.data[2];
                float pressure_bar = (raw_pres / 10.0f - 14.696f) / 14.5038f;
                if (pressure_bar > 0.5f) {
                  id(tpms_fr_battery).publish_state(battery);
                  id(tpms_fr_temperature).publish_state(temperature);
                  id(tpms_fr_pressure).publish_state(pressure_bar);
                }
              }
            }
    - mac_address: "00:00:00:00:00:00"  # Rear Right – replace with your sensor MAC
      then:
        - lambda: |-
            for (auto data : x.get_manufacturer_datas()) {
              if (data.data.size() >= 3) {
                uint16_t mfr_id    = data.uuid.get_uuid().uuid.uuid16;
                float battery      = ((mfr_id >> 8) & 0xFF) * 0.1f;
                float temperature  = (float)data.data[0];
                uint16_t raw_pres  = (data.data[1] << 8) | data.data[2];
                float pressure_bar = (raw_pres / 10.0f - 14.696f) / 14.5038f;
                if (pressure_bar > 0.5f) {
                  id(tpms_rr_battery).publish_state(battery);
                  id(tpms_rr_temperature).publish_state(temperature);
                  id(tpms_rr_pressure).publish_state(pressure_bar);
                }
              }
            }
    - mac_address: "00:00:00:00:00:00"  # Rear Left – replace with your sensor MAC
      then:
        - lambda: |-
            for (auto data : x.get_manufacturer_datas()) {
              if (data.data.size() >= 3) {
                uint16_t mfr_id    = data.uuid.get_uuid().uuid.uuid16;
                float battery      = ((mfr_id >> 8) & 0xFF) * 0.1f;
                float temperature  = (float)data.data[0];
                uint16_t raw_pres  = (data.data[1] << 8) | data.data[2];
                float pressure_bar = (raw_pres / 10.0f - 14.696f) / 14.5038f;
                if (pressure_bar > 0.5f) {
                  id(tpms_rl_battery).publish_state(battery);
                  id(tpms_rl_temperature).publish_state(temperature);
                  id(tpms_rl_pressure).publish_state(pressure_bar);
                }
              }
            }

bluetooth_proxy:
  active: false

# ─── Truma ──────────────────────────────────────────────────────────────────
truma_inetbox:
  uart_id: lin_uart_bus
  lin_checksum: VERSION_2

climate:
  - platform: truma_inetbox
    name: "Room"
    type: ROOM
  - platform: truma_inetbox
    name: "Water"
    type: WATER

binary_sensor:
  - platform: truma_inetbox
    name: "CP Plus alive"
    type: CP_PLUS_CONNECTED
    id: cp_plus_alive
  - platform: truma_inetbox
    name: "Heater has error"
    type: HEATER_HAS_ERROR
  - platform: truma_inetbox
    name: "Room Heater active"
    type: HEATER_ROOM
    id: HEATER_ROOM
  - platform: truma_inetbox
    name: "Water Heater active"
    type: HEATER_WATER
    id: HEATER_WATER
  - platform: truma_inetbox
    name: "Heater mode Diesel"
    type: HEATER_DIESEL
  - platform: truma_inetbox
    name: "Heater mode Mix 1"
    type: HEATER_MIX_1
  - platform: truma_inetbox
    name: "Heater mode Mix 2"
    type: HEATER_MIX_2
  - platform: truma_inetbox
    name: "Heater mode Electric"
    type: HEATER_ELECTRICITY
  - platform: truma_inetbox
    name: "Timer active"
    type: TIMER_ACTIVE
    id: TIMER_ACTIVE
  - platform: truma_inetbox
    name: "Timer Room Heater active"
    type: TIMER_ROOM
  - platform: truma_inetbox
    name: "Timer Water Heater active"
    type: TIMER_WATER

number:
  - platform: truma_inetbox
    name: "Target Room Temperature"
    type: TARGET_ROOM_TEMPERATURE
  - platform: truma_inetbox
    name: "Target Water Temperature"
    type: TARGET_WATER_TEMPERATURE
  - platform: truma_inetbox
    name: "Electric Power Level"
    type: ELECTRIC_POWER_LEVEL

sensor:
  # Truma
  - platform: truma_inetbox
    name: "Current Room Temperature"
    type: CURRENT_ROOM_TEMPERATURE
  - platform: truma_inetbox
    name: "Current Water Temperature"
    type: CURRENT_WATER_TEMPERATURE
  - platform: truma_inetbox
    name: "Target Room Temperature"
    type: TARGET_ROOM_TEMPERATURE
  - platform: truma_inetbox
    name: "Target Water Temperature"
    type: TARGET_WATER_TEMPERATURE
  - platform: truma_inetbox
    name: "Heater Error Code"
    type: HEATER_ERROR_CODE
  - platform: truma_inetbox
    name: "Heating Mode"
    type: HEATING_MODE
  - platform: truma_inetbox
    name: "Electric Power Level"
    type: ELECTRIC_POWER_LEVEL
  - platform: truma_inetbox
    name: "Energy Mix"
    type: ENERGY_MIX
  - platform: truma_inetbox
    name: "Operating Status"
    type: OPERATING_STATUS
  # System
  - platform: internal_temperature
    name: "TR ESP32 Temperature"
  - platform: wifi_signal
    name: "TR WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: "diagnostic"
  - platform: copy
    source_id: wifi_signal_db
    name: "TR WiFi Signal"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: "diagnostic"
    device_class: ""
  - platform: uptime
    name: Uptime Sensor
  # Diesel De-coking
  - platform: template
    name: "Diesel De-coking Remaining Time"
    id: decoking_timer_sensor
    unit_of_measurement: "min"
    accuracy_decimals: 0
    icon: mdi:timer-outline
    state_class: measurement
  # TPMS Front Left
  - platform: template
    name: "TPMS Front Left Pressure"
    id: tpms_fl_pressure
    unit_of_measurement: "bar"
    accuracy_decimals: 2
    icon: mdi:tire
    device_class: pressure
    state_class: measurement
  - platform: template
    name: "TPMS Front Left Temperature"
    id: tpms_fl_temperature
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    icon: mdi:thermometer
    device_class: temperature
    state_class: measurement
  - platform: template
    name: "TPMS Front Left Battery"
    id: tpms_fl_battery
    unit_of_measurement: "V"
    accuracy_decimals: 1
    icon: mdi:battery
    device_class: voltage
    state_class: measurement
  # TPMS Front Right
  - platform: template
    name: "TPMS Front Right Pressure"
    id: tpms_fr_pressure
    unit_of_measurement: "bar"
    accuracy_decimals: 2
    icon: mdi:tire
    device_class: pressure
    state_class: measurement
  - platform: template
    name: "TPMS Front Right Temperature"
    id: tpms_fr_temperature
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    icon: mdi:thermometer
    device_class: temperature
    state_class: measurement
  - platform: template
    name: "TPMS Front Right Battery"
    id: tpms_fr_battery
    unit_of_measurement: "V"
    accuracy_decimals: 1
    icon: mdi:battery
    device_class: voltage
    state_class: measurement
  # TPMS Rear Right
  - platform: template
    name: "TPMS Rear Right Pressure"
    id: tpms_rr_pressure
    unit_of_measurement: "bar"
    accuracy_decimals: 2
    icon: mdi:tire
    device_class: pressure
    state_class: measurement
  - platform: template
    name: "TPMS Rear Right Temperature"
    id: tpms_rr_temperature
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    icon: mdi:thermometer
    device_class: temperature
    state_class: measurement
  - platform: template
    name: "TPMS Rear Right Battery"
    id: tpms_rr_battery
    unit_of_measurement: "V"
    accuracy_decimals: 1
    icon: mdi:battery
    device_class: voltage
    state_class: measurement
  # TPMS Rear Left
  - platform: template
    name: "TPMS Rear Left Pressure"
    id: tpms_rl_pressure
    unit_of_measurement: "bar"
    accuracy_decimals: 2
    icon: mdi:tire
    device_class: pressure
    state_class: measurement
  - platform: template
    name: "TPMS Rear Left Temperature"
    id: tpms_rl_temperature
    unit_of_measurement: "°C"
    accuracy_decimals: 0
    icon: mdi:thermometer
    device_class: temperature
    state_class: measurement
  - platform: template
    name: "TPMS Rear Left Battery"
    id: tpms_rl_battery
    unit_of_measurement: "V"
    accuracy_decimals: 1
    icon: mdi:battery
    device_class: voltage
    state_class: measurement

script:
  - id: script_diesel_decoking
    then:
      - select.set:
          id: select_energy_mix
          option: "Diesel"
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: 30
          heating_mode: HIGH
      - lambda: |-
          id(decoking_remaining) = 45;
          id(decoking_timer_sensor).publish_state(45);
      - delay: 45min
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: 0
      - lambda: |-
          id(decoking_remaining) = 0;
          id(decoking_timer_sensor).publish_state(0);

switch:
  - platform: template
    name: "Activate Room Heater"
    lambda: |-
      return id(HEATER_ROOM).state;
    turn_on_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: 16
          heating_mode: ECO
    turn_off_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: 0
  - platform: template
    name: "Activate Water Heater"
    lambda: |-
      return id(HEATER_WATER).state;
    turn_on_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_target_water_temperature:
          temperature: 80
    turn_off_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_target_water_temperature:
          temperature: 0
  - platform: template
    name: "Activate Water Heater (enum)"
    lambda: |-
      return id(HEATER_WATER).state;
    turn_on_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_target_water_temperature_enum:
          temperature: BOOST
    turn_off_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.heater.set_target_water_temperature_enum: "OFF"
  - platform: template
    name: "Activate Timer"
    lambda: |-
      return id(TIMER_ACTIVE).state;
    turn_on_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.timer.activate:
          start: 7:00
          stop: 7:45
          room_temperature: 18
          heating_mode: ECO
          water_temperature: 40
          energy_mix: DIESEL
          watt: 0
    turn_off_action:
      - lambda: 'id(led_color) = 2; id(led_ticks) = 3;'
      - truma_inetbox.timer.disable

select:
  - platform: truma_inetbox
    name: "Energy Mix"
    id: select_energy_mix
    type: HEATER_ENERGY_MIX_DIESEL
  - platform: truma_inetbox
    name: "Fan Mode"
    type: HEATER_FAN_MODE_COMBI

button:
  - platform: restart
    name: "Truma ESP Restart"
    id: restart_button
  - platform: template
    name: "Start Diesel De-coking"
    icon: mdi:fire
    on_press:
      - script.execute: script_diesel_decoking
  - platform: template
    name: "Abort Diesel De-coking"
    icon: mdi:stop
    on_press:
      - script.stop: script_diesel_decoking
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: 0
      - lambda: |-
          id(decoking_remaining) = 0;
          id(decoking_timer_sensor).publish_state(0);

web_server:
  port: 80
  local: true
  version: 3
  include_internal: true
