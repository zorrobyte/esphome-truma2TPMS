###############################
# ESPHome Version >= 2026.4.3 #
# ESP32 !                     #
# Truma 6DE                   #
###############################

esphome:
  name: "truma"
  friendly_name: "Truma Heater"
  min_version: "2026.4.3"

external_components:
  - source: 
      type: git
      url: https://github.com/havanti/esphome-truma
    components: [truma_inetbox, uart]
    refresh: 24h     # check for updates once a day (recommended)
    # refresh: always  # always download latest (slower builds, use during development)
    # refresh: 0s      # never re-download (fastest builds, no automatic updates)


esp32:
  board: esp32dev
  framework:
    type: esp-idf
#    version: recommended # to reduce binary size
#    sdkconfig_options:
#      CONFIG_ESP32_REV_MIN: "3"

logger:
  level: DEBUG
  baud_rate: 115200 

# Optional: Home Assistant integration
api:
  encryption:
    key: ""  # WARNING: generate a 32-byte base64 key before deploying — esphome.io/components/api.html
  on_client_connected:
    - logger.log: "Home Assistant CONNECTED"
  on_client_disconnected:
    - logger.log: "Home Assistant DISCONNECTED"

ota:
  platform: esphome
  password: "12345678901234567890123456789012"  # WARNING: replace with a unique password before deploying

# Two network configurations
wifi:
  networks:
    - ssid: !secret wifi_Mobile_ssid
      password: !secret wifi_Mobile_password
    - ssid: !secret wifi_Home_ssid
      password: !secret wifi_Home_password
  fast_connect: false
  output_power: 17dB
  power_save_mode: none
  reboot_timeout: 0s
  on_connect:
    - logger.log: "WiFi CONNECTED"
  on_disconnect:
    - logger.log: "WiFi DISCONNECTED"

# Reconnect watchdog: if WiFi is lost, attempt soft-reconnect every 5 minutes
interval:
  - interval: 5min
    startup_delay: 2min
    then:
      - if:
          condition:
            not:
              wifi.connected:
          then:
            - logger.log: "WiFi lost - attempting soft-reconnect"
            - wifi.disable:
            - delay: 5s
            - wifi.enable:

uart:
  - id: lin_uart_bus
    tx_pin: 17
    rx_pin: 16
    baud_rate: 9600
    data_bits: 8
    parity: NONE
    stop_bits: 2

time:
  - platform: homeassistant
    id: homeassistant_time

truma_inetbox:
  uart_id: lin_uart_bus
  lin_checksum: VERSION_2

climate:
  - platform: truma_inetbox
    name: "Room"
    type: ROOM
    
  - platform: truma_inetbox
    name: "Water"
    type: WATER

binary_sensor:
  - platform: truma_inetbox
    name: "CP Plus Connected"
    type: CP_PLUS_CONNECTED

  - platform: truma_inetbox
    name: "Heater Has Error"
    type: HEATER_HAS_ERROR

  - platform: truma_inetbox
    name: "Room Heater Active"
    type: HEATER_ROOM
    id: HEATER_ROOM

  - platform: truma_inetbox
    name: "Water Heater Active"
    type: HEATER_WATER
    id: HEATER_WATER

  - platform: truma_inetbox
    name: "Heater Mode Diesel"
    type: HEATER_DIESEL

  - platform: truma_inetbox
    name: "Heater Mode Mix 1"
    type: HEATER_MIX_1
  
  - platform: truma_inetbox
    name: "Heater Mode Mix 2"
    type: HEATER_MIX_2
  
  - platform: truma_inetbox
    name: "Heater Mode Electric"
    type: HEATER_ELECTRICITY

  - platform: truma_inetbox
    name: "Timer Active"
    type: TIMER_ACTIVE
    id: TIMER_ACTIVE

  - platform: truma_inetbox
    name: "Timer Room Heater Active"
    type: TIMER_ROOM

  - platform: truma_inetbox
    name: "Timer Water Heater Active"
    type: TIMER_WATER    

number:  
  - platform: truma_inetbox
    name: "Target Room Temperature"
    type: TARGET_ROOM_TEMPERATURE
 
  - platform: truma_inetbox
    name: "Target Water Temperature"
    type: TARGET_WATER_TEMPERATURE
 
  - platform: truma_inetbox
    name: "Electric Power Level"
    type: ELECTRIC_POWER_LEVEL

sensor:
  - platform: truma_inetbox
    name: "Current Room Temperature"
    type: CURRENT_ROOM_TEMPERATURE

  - platform: truma_inetbox
    name: "Current Water Temperature"
    type: CURRENT_WATER_TEMPERATURE

  - platform: truma_inetbox
    name: "Target Room Temperature Status"
    type: TARGET_ROOM_TEMPERATURE

  - platform: truma_inetbox
    name: "Target Water Temperature Status"
    type: TARGET_WATER_TEMPERATURE

  - platform: truma_inetbox
    name: "Heater Error Code"
    type: HEATER_ERROR_CODE

  - platform: truma_inetbox
    name: "Heating Mode"
    type: HEATING_MODE

  - platform: truma_inetbox
    name: "Electric Power Level Status"
    type: ELECTRIC_POWER_LEVEL

  - platform: truma_inetbox
    name: "Energy Mix Status"
    type: ENERGY_MIX

  - platform: truma_inetbox
    name: "Operating Status"
    type: OPERATING_STATUS

  - platform: internal_temperature
    name: "ESP32 Internal Temperature"
    entity_category: diagnostic

  - platform: wifi_signal
    name: "WiFi Signal dB"
    id: wifi_signal_db
    update_interval: 60s
    entity_category: diagnostic

  - platform: copy
    source_id: wifi_signal_db
    name: "WiFi Signal"
    filters:
      - lambda: return min(max(2 * (x + 100.0), 0.0), 100.0);
    unit_of_measurement: "Signal %"
    entity_category: diagnostic
    device_class: ""

  - platform: uptime
    name: "Uptime"
    entity_category: diagnostic

text_sensor:
  - platform: truma_inetbox
    name: "ESPHome Truma Version"

switch:
  - platform: template
    name: "Activate Room Heater"
    lambda: |-
      return id(HEATER_ROOM).state;
    turn_on_action:
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: !lambda |-
            return 16;
          heating_mode: ECO
    turn_off_action:
      - truma_inetbox.heater.set_target_room_temperature:
          temperature: 0
 
  - platform: template
    name: "Activate Water Heater"
    lambda: |-
      return id(HEATER_WATER).state;
    turn_on_action:
      - truma_inetbox.heater.set_target_water_temperature:
          temperature: 80
    turn_off_action:
      - truma_inetbox.heater.set_target_water_temperature:
          temperature: 0
  
  - platform: template
    name: "Activate Water Heater (enum)"
    lambda: |-
      return id(HEATER_WATER).state;
    turn_on_action:
      - truma_inetbox.heater.set_target_water_temperature_enum:
          temperature: BOOST
    turn_off_action:
      - truma_inetbox.heater.set_target_water_temperature_enum: "OFF"
  
  - platform: template
    name: "Activate Timer"
    lambda: |-
      return id(TIMER_ACTIVE).state;
    turn_on_action:
      - truma_inetbox.timer.activate:
          start: 7:00
          stop: 7:45
          room_temperature: 18
          heating_mode: ECO
          water_temperature: 40
          energy_mix: DIESEL
          watt: 0
    turn_off_action:
      - truma_inetbox.timer.disable

select:
  - platform: truma_inetbox
    name: "Energy Mix"
    type: HEATER_ENERGY_MIX_DIESEL

  - platform: truma_inetbox
    name: "Fan Mode"
    type: HEATER_FAN_MODE_COMBI

web_server:
  port: 80
  local: true
  version: 3
  include_internal: true
  
# Optional: Bluetooth Proxy (uncomment to enable)
# esp32_ble_tracker:
#   scan_parameters:
#     interval: 1100ms
#     window: 1100ms
#     active: false

# bluetooth_proxy:
#   active: true

button:
  - platform: restart
    name: "Restart"
    entity_category: config
